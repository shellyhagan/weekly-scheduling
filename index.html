<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Scheduling — Accelerated Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2744;--navy-light:#2d5282;--cream:#faf9f6;--surface:#fff;
  --border:#e2ddd6;--border-strong:#c8c2b8;--text:#1a1714;--text-muted:#8a8278;
  --critical-bg:#fde8e8;--critical:#7b1d1d;
  --high-bg:#fff0f0;--high:#c53030;
  --med-bg:#fef8ec;--med:#92580a;
  --wait-bg:#eef4fd;--wait:#1a4fa0;
  --done-bg:#edfaf2;--done:#276749;
  --low-bg:#f3f2ef;--low:#5c5a55;
  --cx-bg:#f3f0ff;--cx:#5b21b6;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

header{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-img{background:#fff;border-radius:6px;padding:5px 10px;display:flex;align-items:center;height:38px;}
.logo-img img{height:26px;width:auto;display:block;}
.logo-text{color:#94a3b8;font-size:13px;border-left:1px solid rgba(255,255,255,.15);padding-left:12px;}
.header-right{display:flex;align-items:center;gap:8px;}
.last-updated{color:#64748b;font-size:11px;font-family:'DM Mono',monospace;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;display:inline-block;margin-right:4px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;text-decoration:none;border:none;white-space:nowrap;}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#cbd5e1;}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#fff;}
.btn-blue{background:rgba(99,179,237,.1);border:1px solid rgba(99,179,237,.22);color:#90cdf4;}
.btn-blue:hover{background:rgba(99,179,237,.2);color:#bee3f8;}

.main{padding:20px 24px 40px;max-width:1440px;margin:0 auto;}

.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:5px;}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.c-navy{color:var(--navy);}.c-crit{color:var(--critical);}.c-wait{color:var(--wait);}.c-done{color:var(--done);}

.tab-bar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content;margin-bottom:18px;}
.tab{font-size:13px;font-weight:500;padding:7px 18px;border-radius:7px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--navy);color:#fff;}
.tab:hover:not(.active){color:var(--text);background:var(--cream);}

.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

.ops-grid{display:grid;gap:12px;}
.col-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.col-body{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--border-strong);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.card.crit-card{border-left:3px solid var(--critical);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.card-name{font-size:12px;font-weight:600;line-height:1.3;}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;font-family:'DM Mono',monospace;white-space:nowrap;}
.b-crit{background:var(--critical-bg);color:var(--critical);}
.b-high{background:var(--high-bg);color:var(--high);}
.b-med{background:var(--med-bg);color:var(--med);}
.b-wait{background:var(--wait-bg);color:var(--wait);}
.b-done{background:var(--done-bg);color:var(--done);}
.b-low{background:var(--low-bg);color:var(--low);}
.b-dead{background:#f1f5f9;color:#94a3b8;}
.b-cx{background:var(--cx-bg);color:var(--cx);}
.card-proj{font-size:10px;color:var(--text-muted);margin-bottom:5px;font-family:'DM Mono',monospace;}
.card-owner{display:flex;align-items:center;gap:5px;}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.owner-lbl{font-size:10px;color:var(--text-muted);}
.card-note{font-size:10px;color:var(--text-muted);margin-top:6px;padding-top:5px;border-top:1px solid var(--border);line-height:1.6;}
.card-note-text{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-note-text.expanded{display:block;-webkit-line-clamp:unset;}
.card-note-toggle{display:inline-block;margin-top:3px;font-size:10px;color:var(--navy-light);cursor:pointer;font-weight:600;background:none;border:none;padding:0;font-family:inherit;}
.card-note-toggle:hover{text-decoration:underline;}

.section{margin-bottom:26px;}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.section-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.section-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.section-title{font-size:15px;font-weight:600;}
.section-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}

.cx-banner{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1px solid rgba(91,33,182,.12);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;}
.cx-banner-title{font-size:13px;font-weight:600;color:#5b21b6;margin-bottom:2px;}
.cx-banner-sub{font-size:11px;color:#7c3aed;}
.cx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cx-col-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cx);padding:7px 10px;background:var(--cx-bg);border:1px solid rgba(91,33,182,.15);border-radius:7px;margin-bottom:9px;display:flex;justify-content:space-between;}
.cx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;transition:border-color .15s,box-shadow .15s;}
.cx-card:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.cx-card.cx-complete{border-left:3px solid var(--done);}
.cx-card.cx-dead{border-left:3px solid #cbd5e1;opacity:.55;}
.cx-none{font-size:12px;color:var(--text-muted);padding:16px 12px;text-align:center;font-style:italic;}

.source-footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}
.source-footer a{color:var(--navy-light);text-decoration:none;font-family:'DM Mono',monospace;font-size:10px;}
.source-footer a:hover{text-decoration:underline;}

.pto-banner{background:linear-gradient(135deg,#f0faf6,#dcf5eb);border:1px solid rgba(26,122,74,.14);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;}
.pto-banner-title{font-size:13px;font-weight:600;color:#1a7a4a;margin-bottom:2px;}
.pto-banner-sub{font-size:11px;color:#2d8f5e;}
.pto-timeline{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.pto-month-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);padding:5px 0 4px;border-bottom:1px solid var(--border);margin-top:6px;}
.pto-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s,box-shadow .15s;}
.pto-row:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.pto-row.pto-today{border-left:3px solid #1a7a4a;}
.pto-row.pto-soon{border-left:3px solid var(--med);}
.pto-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.pto-info{flex:1;min-width:0;}
.pto-name{font-size:12px;font-weight:600;margin-bottom:1px;}
.pto-dates{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.pto-hours{font-size:10px;font-weight:600;color:var(--text-muted);white-space:nowrap;margin-left:auto;padding-left:8px;}
.pto-days-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;font-family:'DM Mono',monospace;}
.pto-days-soon{background:#fef8ec;color:#92580a;}
.pto-days-now{background:#edfaf2;color:#276749;}
.pto-days-later{background:#f3f2ef;color:#5c5a55;}
.pto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:4px;}
.pto-person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.pto-person-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pto-person-name{font-size:12px;font-weight:600;}
.pto-person-total{font-size:10px;color:var(--text-muted);}
.pto-bar-wrap{height:4px;background:#eee;border-radius:2px;margin-bottom:8px;}
.pto-bar{height:4px;border-radius:2px;background:#1a7a4a;}
.pto-upcoming-list{display:flex;flex-direction:column;gap:3px;}
.pto-upcoming-item{font-size:10px;color:var(--text-muted);display:flex;justify-content:space-between;}
.pto-upcoming-item span:last-child{font-weight:600;color:var(--text);}
.pto-section-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.pto-empty{font-size:12px;color:var(--text-muted);padding:20px;text-align:center;font-style:italic;}


/* ── Heatmap ── */
.heatmap-wrap{overflow-x:auto;margin-bottom:24px;}
.heatmap-table{border-collapse:collapse;width:100%;min-width:600px;}
.heatmap-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:4px 6px;text-align:center;white-space:nowrap;}
.heatmap-table td{padding:3px 4px;text-align:center;font-size:10px;border:1px solid var(--border);}
.heatmap-table .row-label{font-size:10px;font-weight:600;text-align:left;padding:4px 10px 4px 4px;white-space:nowrap;color:var(--text);border:none;background:transparent;}
.heat-0{background:#f9fafb;color:var(--text-muted);}
.heat-1{background:#dcfce7;color:#166534;}
.heat-2{background:#fef9c3;color:#854d0e;}
.heat-3{background:#fed7aa;color:#9a3412;}
.heat-4{background:#fecaca;color:#991b1b;}
.heat-5{background:#fca5a5;color:#7f1d1d;font-weight:700;}
.heat-cell{border-radius:4px;padding:2px 4px;display:inline-block;min-width:22px;}
/* ── Conflict ── */
.conflict-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.conflict-card{background:#fff8f0;border:1px solid #f6d7b0;border-left:3px solid #c2540a;border-radius:var(--r);padding:10px 14px;}
.conflict-card.conflict-high{background:#fff1f1;border-color:#fbb;border-left-color:#c53030;}
.conflict-card.conflict-ok{background:#f0faf6;border:1px solid #a7f3d0;border-left:3px solid #1a7a4a;}
.conflict-week{font-size:11px;font-weight:700;margin-bottom:4px;}
.conflict-people{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.conflict-chip{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;}
/* ── Coverage ── */
.coverage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px;}
.coverage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.coverage-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.coverage-owner{font-size:12px;font-weight:600;}
.coverage-proj{font-size:10px;color:var(--text-muted);margin-top:1px;}
.coverage-overlap{display:flex;flex-direction:column;gap:4px;}
.coverage-overlap-row{font-size:10px;display:flex;align-items:center;gap:6px;}
.coverage-overlap-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.no-overlap{font-size:10px;color:var(--text-muted);font-style:italic;}

</style>
</head>
<body>
<script>
var OVERLAY_ID = "pw-overlay";
var CORRECT_PW = "access";
document.documentElement.style.visibility = "hidden";
window.addEventListener("DOMContentLoaded", function() {
  var overlay = document.createElement("div");
  overlay.id = OVERLAY_ID;
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#0f2744;display:flex;align-items:center;justify-content:center;z-index:99999;";
  overlay.innerHTML = '<div style="background:#fff;padding:40px;border-radius:12px;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.3);"><input id="pw-input" type="password" placeholder="Password" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;margin-bottom:12px;"><p id="pw-error" style="color:red;font-family:sans-serif;font-size:13px;display:none;margin-bottom:8px;">Incorrect password. Try again.</p><button id="pw-btn" style="width:100%;padding:10px;background:#0f2744;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;">Enter</button></div>';
  document.body.appendChild(overlay);
  document.documentElement.style.visibility = "visible";
  document.getElementById("pw-input").focus();
  document.getElementById("pw-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); checkPW(); }
  });
  document.getElementById("pw-btn").addEventListener("click", function() { checkPW(); });
});
function checkPW() {
  var entered = document.getElementById("pw-input").value.trim().toLowerCase();
  if (entered === CORRECT_PW) {
    var el = document.getElementById(OVERLAY_ID);
    if (el) el.parentNode.removeChild(el);
  } else {
    document.getElementById("pw-error").style.display = "block";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}
</script>

function priSort(a, b) {
  var pa = PRI_ORDER[(a.priority||"").toLowerCase().trim()];
  var pb = PRI_ORDER[(b.priority||"").toLowerCase().trim()];
  if (pa === undefined) pa = 2;
  if (pb === undefined) pb = 2;
  return pa - pb;
}
function sortPri(arr) { return arr.slice().sort(priSort); }

  if (l.indexOf("critical") !== -1) return '<span class="badge b-crit">Critical</span>';
  if (l.indexOf("high")     !== -1) return '<span class="badge b-high">High</span>';
  if (l.indexOf("medium")   !== -1) return '<span class="badge b-med">Medium</span>';
  if (l.indexOf("wait")     !== -1) return '<span class="badge b-wait">Waiting</span>';

function parseCSV(text) {
  var lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function(h){
    return h.replace(/^"|"$/g,"").trim().toLowerCase()
            .replace(/client.*product/i,"client")
            .replace(/project number/i,"project_number")
            .replace(/\s+/g,"_");
  });
  var rows=[];
  for (var i=1;i<lines.length;i++){
    var vals=[],cur="",inQ=false;
    for (var j=0;j<lines[i].length;j++){
      var ch=lines[i][j];
      if(ch==="\""){inQ=!inQ;}
      else if(ch===","&&!inQ){vals.push(cur);cur="";}
      else{cur+=ch;}
    }
    vals.push(cur);
    var row={};
    headers.forEach(function(h,k){row[h]=(vals[k]||"").replace(/^"|"$/g,"").trim();});
    rows.push(row);
  }
  return rows;
}

var ONBOARDING_CLIENTS = ["Europerfumes","The Maker","Clean Skin Club"];
var RD_CLIENTS = ["Store Database","Prod Development - Venus","Product Development",
                  "Prod Development - Dillard's","Mission Control"];

function normalizeRows(rows) {
  return rows.map(function(r){
    function g(){for(var i=0;i<arguments.length;i++){var v=r[arguments[i]]||r[(arguments[i]||"").toLowerCase()]||"";if(v)return(""+v).trim();}return"";}
    var rawType = g("type","project_type","Type");
    var tl = rawType.replace(/\\/g,"").toLowerCase();
    var client = g("client","client_product")||Object.values(r)[0]||"";
    var proj   = (g("project")||"").toLowerCase();
    var type;
    if (tl.indexOf("onboard") !== -1 || proj.indexOf("onboard") !== -1) {
      type = "Onboarding";
    } else if (tl.indexOf("r&d") !== -1 || tl.indexOf("r&amp;d") !== -1 || tl === "r\\&d") {
      type = "R&D";
    } else if (tl.indexOf("internal") !== -1 || tl.indexOf("training") !== -1 || proj.indexOf("training") !== -1) {
      type = "Internal";
    } else if (ONBOARDING_CLIENTS.indexOf(client) !== -1) {
      type = "Onboarding";
    } else if (RD_CLIENTS.indexOf(client) !== -1) {
      type = "R&D";
    } else {
      type = "Customer";
    }
    return {
      client:client, project:g("project"), type:type, priority:g("priority"),
      owner:g("owner"), engineer:g("engineer"), ba:g("ba"),
      notes:g("notes","note")
    };
  }).filter(function(p){return p.client&&p.client.length>0;});
}

  SEED_TYPE_MAP[keyFull]   = p.type;
  if (!SEED_TYPE_MAP[keyClient]) SEED_TYPE_MAP[keyClient] = p.type;
});

function loadLive(){
  setStatus("Refreshing&hellip;",false);
  fetch(APPS_SCRIPT+"?t="+Date.now(),{cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(text){
      var parsed;
      try{parsed=JSON.parse(text);}catch(e){parsed=parseCSV(text);}
      if(Array.isArray(parsed)&&parsed.length>0){
        var normalized = normalizeRows(parsed);
        normalized.forEach(function(p){
          var keyFull   = (p.client + "|" + p.project).toLowerCase();
          var keyClient = p.client.toLowerCase();
          if      (SEED_TYPE_MAP[keyFull])   p.type = SEED_TYPE_MAP[keyFull];
          else if (SEED_TYPE_MAP[keyClient]) p.type = SEED_TYPE_MAP[keyClient];
        });
        projects = normalized;
        var now = new Date();
        setStatus("Updated "+now.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" at "+now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),true);
        render();
      }
    })
    .catch(function(){setStatus("Showing embedded data &mdash; click Refresh to reload",false);});
}

function ptoGroupBlocks(entries) {
  // Group consecutive days per person+type into blocks
  var byPersonType = {};
  entries.forEach(function(e){
    var key = e.name + "|||" + (e.type||"Personal Time");
    if (!byPersonType[key]) byPersonType[key] = [];
    byPersonType[key].push(e.date);
  });
  var blocks = [];
  Object.keys(byPersonType).forEach(function(key){
    var parts = key.split("|||");
    var name = parts[0], type = parts[1];
    var dates = byPersonType[key].sort();
    var start = dates[0], prev = dates[0];
    for (var i=1; i<dates.length; i++){
      var d1 = new Date(prev), d2 = new Date(dates[i]);
      var diff = (d2-d1)/(1000*60*60*24);
      if (diff <= 3) {
        prev = dates[i];
      } else {
        var actualDays = byPersonType[key].filter(function(d){return d>=start&&d<=prev;}).length;
        blocks.push({name:name, type:type, start:start, end:prev, days:actualDays});
        start = dates[i]; prev = dates[i];
      }
    }
    var actualDays = byPersonType[key].filter(function(d){return d>=start&&d<=prev;}).length;
    blocks.push({name:name, type:type, start:start, end:prev, days:actualDays});
  });
  return blocks;
}

function fmtDate(ds) {
  var d = new Date(ds + "T12:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function fmtDow(ds) {
  var d = new Date(ds + "T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short"});
}
function fmtDateFull(ds) {
  var d = new Date(ds + "T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

function ptoView() {
  var today = new Date("2026-06-03T12:00:00");
  var upcoming = PTO_RAW.filter(function(e){ return new Date(e.date+"T12:00:00") >= today; });
  var blocks = ptoGroupBlocks(upcoming);
  blocks.sort(function(a,b){ return a.start < b.start ? -1 : a.start > b.start ? 1 : 0; });

  // Stats: who's out today, this week, this month
  var todayStr = "2026-06-03";
  var nextWeekStart = "2026-06-08";
  var nextWeekEnd = "2026-06-12";
  var monthEnd = "2026-06-30";
  var outToday = upcoming.filter(function(e){ return e.date === todayStr; });
  var outThisWeek = upcoming.filter(function(e){ return e.date >= nextWeekStart && e.date <= nextWeekEnd; });
  var outThisMonth = upcoming.filter(function(e){ return e.date >= todayStr && e.date <= monthEnd; });

  // Build banner
  var bannerHtml = '<div class="pto-banner">' +
    '<div class="pto-banner-title">&#x1F3D6; Team PTO Calendar</div>' +
    '<div class="pto-banner-sub">Upcoming time off across the team &mdash; ' + blocks.length + ' PTO block' + (blocks.length!==1?"s":"") + ' remaining in 2026</div>' +
    '</div>';

  // Quick stats bar
  var todayNames = [...new Set(outToday.map(function(e){return e.name.split(" ")[0];}))];
  var weekNames  = [...new Set(outThisWeek.map(function(e){return e.name;}))].map(function(name){
    var days = outThisWeek.filter(function(e){return e.name===name;}).length;
    return {first: name.split(" ")[0], days: days};
  });
  var monthNames = [...new Set(outThisMonth.map(function(e){return e.name.split(" ")[0];}))];

  var statsHtml = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;">' +
    ptoBadgeStat("Out Today", todayNames, "#edfaf2", "#276749") +
    ptoBadgeStatDays("Out Next Week", weekNames, "#fef8ec", "#92580a") +
    ptoBadgeStat("Out in June", monthNames, "#eef4fd", "#1a4fa0") +
    '</div>';

  // Timeline view
  var timelineHtml = '<div class="pto-section-title">&#x1F4C5; Upcoming PTO Blocks</div>';
  var prevMonth = "";
  var timelineRows = "";
  blocks.slice(0,40).forEach(function(b){
    var startD = new Date(b.start+"T12:00:00");
    var month = startD.toLocaleDateString("en-US",{month:"long",year:"numeric"});
    if (month !== prevMonth) {
      timelineRows += '<div class="pto-month-head">' + month + '</div>';
      prevMonth = month;
    }
    var c = OC[b.name] || {bg:"#e8e6e0",fg:"#6b6860"};
    var ini = b.name.split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2);
    var startObj = new Date(b.start+"T12:00:00");
    var daysAway = Math.ceil((startObj-today)/(1000*60*60*24));
    var bdgClass = daysAway === 0 ? "pto-days-now" : daysAway <= 14 ? "pto-days-soon" : "pto-days-later";
    var bdgText  = daysAway === 0 ? "Today" : daysAway === 1 ? "Tomorrow" : "in " + daysAway + "d";
    var isSingle = b.start === b.end;
    var dateStr = isSingle
      ? fmtDow(b.start) + ", " + fmtDate(b.start)
      : fmtDow(b.start) + " " + fmtDate(b.start) + " – " + fmtDow(b.end) + " " + fmtDate(b.end);
    // Count actual working days in this block
    var actualDays = upcoming.filter(function(e){ return e.name===b.name && e.type===b.type && e.date>=b.start && e.date<=b.end; }).length;
    var isCS = b.type === "Community Service";
    var typeBadge = isCS
      ? '<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:99px;background:#e0f2fe;color:#0369a1;margin-left:4px;white-space:nowrap;">&#x1F91D; Community Service</span>'
      : '<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:99px;background:#f3f2ef;color:#5c5a55;margin-left:4px;white-space:nowrap;">&#x1F3D6; Personal Time</span>';
    timelineRows += '<div class="pto-row' + (daysAway===0?" pto-today":daysAway<=7?" pto-soon":"") + '">' +
      '<div class="pto-av" style="background:' + c.bg + ';color:' + c.fg + ';">' + ini + '</div>' +
      '<div class="pto-info">' +
        '<div class="pto-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;">' + esc(b.name) + typeBadge + '</div>' +
        '<div class="pto-dates">' + dateStr + '</div>' +
      '</div>' +
      '<span class="pto-hours">' + actualDays + (actualDays===1?" day":" days") + '</span>' +
      '<span class="pto-days-badge ' + bdgClass + '">' + bdgText + '</span>' +
    '</div>';
  });

  timelineHtml += '<div class="pto-timeline">' + timelineRows + '</div>';


  // ── HEATMAP: weeks Jun–Dec 2026 ──────────────────────────────────────
  var DEPARTMENTS = [
    {label:"CEO",         members:["Chad Symens"]},

  // Flatten to ordered list (only include those in OC)
  var teamMembers = [];
  DEPARTMENTS.forEach(function(dept){ dept.members.forEach(function(m){ if(OC[m]) teamMembers.push(m); }); });
  var schedulingMembers = Object.keys(OC).filter(function(n){ return n !== "Shelly Hagan"; });
  // Build week list: Mon-Fri weeks from today's week through end of 2026
  function getMonday(d) {
    var day = d.getDay(), diff = d.getDate() - day + (day===0?-6:1);
    return new Date(d.setDate(diff));
  }
  var weekStarts = [];
  var wStart = getMonday(new Date("2026-06-03T12:00:00"));
  var yearEnd = new Date("2026-12-31T12:00:00");
  while (wStart <= yearEnd) {
    weekStarts.push(new Date(wStart));
    wStart = new Date(wStart); wStart.setDate(wStart.getDate()+7);
  }
  // For each week, who is out?
  function weekLabel(d) {
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  }
  function dateStr(d) {
    return d.toISOString().slice(0,10);
  }
  // build out-set per week
  var weekData = weekStarts.map(function(ws){
    var we = new Date(ws); we.setDate(we.getDate()+4); // Friday

      return e.date >= wsStr && e.date <= weStr && schedulingMembers.indexOf(e.name) !== -1;

  var lastDept = null;
  teamMembers.forEach(function(name){

    if (dept !== lastDept) {

      heatHtml += '<tr><td colspan="' + colCount + '" style="padding:6px 4px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);background:var(--bg);border:none;border-bottom:1px solid var(--border);">' + esc(dept) + '</td></tr>';

    }
    var c = OC[name];
    var ini = name.split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2);
    heatHtml += '<tr><td class="row-label"><div style="display:flex;align-items:center;gap:6px;">' +
      '<div class="pto-av" style="width:18px;height:18px;font-size:7px;background:'+c.bg+';color:'+c.fg+';">'+ini+'</div>' +
      esc(name) + '</div></td>';
    weekData.slice(0,18).forEach(function(wd){
      var out = wd.out.indexOf(name) !== -1;
      // count days out this week for this person
      var daysOut = upcoming.filter(function(e){
        return e.name===name && e.date>=wd.wsStr && e.date<=wd.weStr;
      }).length;
      if (daysOut === 0) {
        heatHtml += '<td><span class="heat-cell heat-0">—</span></td>';
      } else {
        var cls = daysOut>=5?"heat-5":daysOut>=4?"heat-4":daysOut>=3?"heat-3":daysOut>=2?"heat-2":"heat-1";
        heatHtml += '<td><span class="heat-cell '+cls+'">' + daysOut + 'd</span></td>';
      }
    });
    heatHtml += '</tr>';
  });

  heatHtml += '</tbody></table></div>';
  var heatmapHtml = heatHtml;

  // ── CONFLICT DETECTOR ─────────────────────────────────────────────────
  var conflictHtml = '<div class="pto-section-title">&#x26A0;&#xFE0F; Scheduling Risk Weeks</div>' +
    '<div class="conflict-list">';

  var riskWeeks = weekData.slice(0,26).filter(function(wd){ return wd.out.length >= 2; });
  if (riskWeeks.length === 0) {
    conflictHtml += '<div class="pto-empty">No weeks with multiple people out in the next 26 weeks.</div>';
  } else {
    riskWeeks.forEach(function(wd){
      var count = wd.out.length;
      var isHigh = count >= 4;
      var isMed  = count >= 2 && count < 4;
      var cls = isHigh ? "conflict-high" : "";
      var label = isHigh ? "&#x1F534; High Risk — " + count + " people out"
                : "&#x1F7E1; Watch — " + count + " people out";
      var chips = wd.out.map(function(name){
        var c = OC[name]||{bg:"#e8e6e0",fg:"#6b6860"};
        return '<span class="conflict-chip" style="background:'+c.bg+';color:'+c.fg+';">'+esc(name)+'</span>';
      }).join("");
      conflictHtml += '<div class="conflict-card '+cls+'">' +
        '<div class="conflict-week">' + label + ' &mdash; Week of ' + weekLabel(wd.ws) + ' – ' + weekLabel(wd.we) + '</div>' +
        '<div class="conflict-people">' + chips + '</div>' +
        '</div>';
    });
  }
  conflictHtml += '</div>';

  // ── COVERAGE VIEW: who covers whose projects when owner is out ─────────
  // Build: for each project owner, find their upcoming PTO blocks, then list
  // which OTHER active project owners are also available (not out) that week
  var ownerProjects = {};
  projects.forEach(function(p){
    var owner = p.owner || "";
    if (!owner) return;
    if (!ownerProjects[owner]) ownerProjects[owner] = [];
    ownerProjects[owner].push(p.client + (p.project ? " / " + p.project : ""));
  });

  var coverageHtml = '<div class="pto-section-title">&#x1F91D; Coverage Map — Who\'s Available When an Owner Is Out</div>' +
    '<div class="coverage-grid">';

  var ownersWithPTO = blocks.filter(function(b){
    return ownerProjects[b.name] && ownerProjects[b.name].length > 0 && schedulingMembers.indexOf(b.name) !== -1;
  });

  if (ownersWithPTO.length === 0) {
    coverageHtml += '<div class="pto-empty">No project owners have upcoming PTO.</div>';
  } else {
    // Dedupe by name+start
    var seen = {};
    ownersWithPTO.forEach(function(b){
      var key = b.name + b.start;
      if (seen[key]) return; seen[key] = true;
      var c = OC[b.name]||{bg:"#e8e6e0",fg:"#6b6860"};
      var ini = b.name.split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2);
      var actualDays = upcoming.filter(function(e){
        return e.name===b.name && e.type===b.type && e.date>=b.start && e.date<=b.end;
      }).length;
      var dateRange = b.start===b.end
        ? fmtDow(b.start)+", "+fmtDate(b.start)
        : fmtDow(b.start)+" "+fmtDate(b.start)+" – "+fmtDow(b.end)+" "+fmtDate(b.end);
      // Who else is OUT during this block?
      var alsoOut = upcoming.filter(function(e){
        return e.name !== b.name && e.date >= b.start && e.date <= b.end && schedulingMembers.indexOf(e.name) !== -1;
      }).map(function(e){return e.name;}).filter(function(v,i,a){return a.indexOf(v)===i;});
      // All owners = keys of ownerProjects
      var allOwners = Object.keys(ownerProjects).filter(function(o){ return o !== b.name; });
      var available = allOwners.filter(function(o){ return alsoOut.indexOf(o)===-1; });
      var projs = (ownerProjects[b.name]||[]).slice(0,3);
      var projStr = projs.join(", ") + (ownerProjects[b.name].length>3?" +"+( ownerProjects[b.name].length-3)+" more":"");

      var availChips = available.slice(0,4).map(function(o){
        var oc = OC[o]||{bg:"#e8e6e0",fg:"#6b6860"};
        return '<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:99px;background:'+oc.bg+';color:'+oc.fg+';">'+esc(o.split(" ")[0])+'</span>';
      }).join(" ");
      var moreAvail = available.length > 4 ? ' <span style="font-size:9px;color:var(--text-muted);">+'+( available.length-4)+' more</span>' : "";

      var alsoOutChips = alsoOut.length > 0 ? alsoOut.slice(0,3).map(function(o){
        var oc = OC[o]||{bg:"#fde8e8",fg:"#7b1d1d"};
        return '<span style="font-size:9px;padding:1px 6px;border-radius:99px;background:#fde8e8;color:#7b1d1d;font-weight:600;">'+esc(o.split(" ")[0])+'</span>';
      }).join(" ") : "";

      coverageHtml += '<div class="coverage-card">' +
        '<div class="coverage-card-head">' +
          '<div class="pto-av" style="width:28px;height:28px;font-size:10px;background:'+c.bg+';color:'+c.fg+';">'+ini+'</div>' +
          '<div><div class="coverage-owner">'+esc(b.name)+' out</div>' +
            '<div class="coverage-proj">'+dateRange+' &middot; '+actualDays+'d</div>' +
          '</div>' +
        '</div>' +
        '<div class="coverage-overlap">' +
          '<div class="coverage-overlap-row" style="margin-bottom:3px;"><span style="font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;">Projects</span></div>' +
          '<div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;line-height:1.5;">'+esc(projStr)+'</div>' +
          '<div class="coverage-overlap-row" style="margin-bottom:3px;"><span style="font-size:9px;color:#276749;font-weight:600;text-transform:uppercase;letter-spacing:.06em;">&#x2705; Available owners</span></div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;">'+(available.length>0 ? availChips+moreAvail : '<span style="font-size:10px;color:var(--text-muted);font-style:italic;">None — everyone else busy</span>')+'</div>' +
          (alsoOut.length > 0 ? '<div class="coverage-overlap-row" style="margin-bottom:3px;"><span style="font-size:9px;color:#c53030;font-weight:600;text-transform:uppercase;letter-spacing:.06em;">&#x26A0; Also out</span></div><div style="display:flex;flex-wrap:wrap;gap:3px;">'+alsoOutChips+'</div>' : '') +
        '</div>' +
      '</div>';
    });
  }
  coverageHtml += '</div>';


  return bannerHtml + statsHtml + heatmapHtml + conflictHtml + coverageHtml + timelineHtml;
}

function ptoBadgeStatDays(label, items, bg, fg) {
  var body = items.length === 0
    ? '<span style="font-size:11px;color:var(--text-muted);font-style:italic;">Nobody out</span>'
    : items.map(function(item){
        return '<span style="font-size:11px;font-weight:600;padding:2px 7px;background:' + bg + ';color:' + fg + ';border-radius:99px;margin:1px 2px;">' + item.first + ' <span style="font-weight:400;opacity:.75;">(' + item.days + 'd)</span></span>';
      }).join("");
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;">' +
    '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px;">' + label + '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:2px;">' + body + '</div>' +
  '</div>';
}

function ptoBadgeStat(label, names, bg, fg) {
  var body = names.length === 0
    ? '<span style="font-size:11px;color:var(--text-muted);font-style:italic;">Nobody out</span>'
    : names.map(function(n){
        return '<span style="font-size:11px;font-weight:600;padding:2px 7px;background:' + bg + ';color:' + fg + ';border-radius:99px;margin:1px 2px;">' + n + '</span>';
      }).join("");
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;">' +
    '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px;">' + label + '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:2px;">' + body + '</div>' +
  '</div>';
}


setStatus("Embedded data current as of last deploy &mdash; click Refresh for live update",false);
render();
</script>
