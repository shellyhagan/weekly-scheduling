<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Scheduling — Accelerated Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2744;--navy-light:#2d5282;--cream:#faf9f6;--surface:#fff;
  --border:#e2ddd6;--border-strong:#c8c2b8;--text:#1a1714;--text-muted:#8a8278;
  --critical-bg:#fde8e8;--critical:#7b1d1d;
  --high-bg:#fff0f0;--high:#c53030;
  --med-bg:#fef8ec;--med:#92580a;
  --wait-bg:#eef4fd;--wait:#1a4fa0;
  --done-bg:#edfaf2;--done:#276749;
  --low-bg:#f3f2ef;--low:#5c5a55;
  --cx-bg:#f3f0ff;--cx:#5b21b6;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

header{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-img{background:#fff;border-radius:6px;padding:5px 10px;display:flex;align-items:center;height:38px;}
.logo-img img{height:26px;width:auto;display:block;}
.logo-text{color:#94a3b8;font-size:13px;border-left:1px solid rgba(255,255,255,.15);padding-left:12px;}
.header-right{display:flex;align-items:center;gap:8px;}
.last-updated{color:#64748b;font-size:11px;font-family:'DM Mono',monospace;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;display:inline-block;margin-right:4px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;text-decoration:none;border:none;white-space:nowrap;}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#cbd5e1;}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#fff;}
.btn-blue{background:rgba(99,179,237,.1);border:1px solid rgba(99,179,237,.22);color:#90cdf4;}
.btn-blue:hover{background:rgba(99,179,237,.2);color:#bee3f8;}

.main{padding:20px 24px 40px;max-width:1440px;margin:0 auto;}

.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:5px;}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.c-navy{color:var(--navy);}.c-crit{color:var(--critical);}.c-wait{color:var(--wait);}.c-done{color:var(--done);}

.tab-bar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content;margin-bottom:18px;}
.tab{font-size:13px;font-weight:500;padding:7px 18px;border-radius:7px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--navy);color:#fff;}
.tab:hover:not(.active){color:var(--text);background:var(--cream);}

.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

.ops-grid{display:grid;gap:12px;}
.col-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.col-body{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--border-strong);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.card.crit-card{border-left:3px solid var(--critical);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.card-name{font-size:12px;font-weight:600;line-height:1.3;}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;font-family:'DM Mono',monospace;white-space:nowrap;}
.b-crit{background:var(--critical-bg);color:var(--critical);}
.b-high{background:var(--high-bg);color:var(--high);}
.b-med{background:var(--med-bg);color:var(--med);}
.b-wait{background:var(--wait-bg);color:var(--wait);}
.b-done{background:var(--done-bg);color:var(--done);}
.b-low{background:var(--low-bg);color:var(--low);}
.b-dead{background:#f1f5f9;color:#94a3b8;}
.b-cx{background:var(--cx-bg);color:var(--cx);}
.card-proj{font-size:10px;color:var(--text-muted);margin-bottom:5px;font-family:'DM Mono',monospace;}
.card-owner{display:flex;align-items:center;gap:5px;}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.owner-lbl{font-size:10px;color:var(--text-muted);}
.card-note{font-size:10px;color:var(--text-muted);margin-top:6px;padding-top:5px;border-top:1px solid var(--border);line-height:1.6;}
.card-note-text{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-note-text.expanded{display:block;-webkit-line-clamp:unset;}
.card-note-toggle{display:inline-block;margin-top:3px;font-size:10px;color:var(--navy-light);cursor:pointer;font-weight:600;background:none;border:none;padding:0;font-family:inherit;}
.card-note-toggle:hover{text-decoration:underline;}

.section{margin-bottom:26px;}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.section-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.section-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.section-title{font-size:15px;font-weight:600;}
.section-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}

.cx-banner{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1px solid rgba(91,33,182,.12);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;}
.cx-banner-title{font-size:13px;font-weight:600;color:#5b21b6;margin-bottom:2px;}
.cx-banner-sub{font-size:11px;color:#7c3aed;}
.cx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cx-col-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cx);padding:7px 10px;background:var(--cx-bg);border:1px solid rgba(91,33,182,.15);border-radius:7px;margin-bottom:9px;display:flex;justify-content:space-between;}
.cx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;transition:border-color .15s,box-shadow .15s;}
.cx-card:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.cx-card.cx-complete{border-left:3px solid var(--done);}
.cx-card.cx-dead{border-left:3px solid #cbd5e1;opacity:.55;}
.cx-none{font-size:12px;color:var(--text-muted);padding:16px 12px;text-align:center;font-style:italic;}

.source-footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}
.source-footer a{color:var(--navy-light);text-decoration:none;font-family:'DM Mono',monospace;font-size:10px;}
.source-footer a:hover{text-decoration:underline;}
</style>
</head>
<body>

<script>
  (function() {
    const correct = "scheduling";
    document.documentElement.style.visibility = "hidden";
    window.addEventListener("DOMContentLoaded", function() {
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#0f2744;display:flex;align-items:center;justify-content:center;z-index:99999;";
      overlay.innerHTML = `<div style="background:#fff;padding:40px;border-radius:12px;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.3);"><h2 style="font-family:sans-serif;color:#0f2744;margin-bottom:8px;">Weekly Scheduling</h2><p style="font-family:sans-serif;color:#888;font-size:14px;margin-bottom:24px;">Enter your password to continue</p><input id="pw-input" type="password" placeholder="Password" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;margin-bottom:12px;"><p id="pw-error" style="color:red;font-family:sans-serif;font-size:13px;display:none;margin-bottom:8px;">Incorrect password. Try again.</p><button onclick="checkPW()" style="width:100%;padding:10px;background:#0f2744;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;">Enter</button></div>`;
      document.body.appendChild(overlay);
      document.documentElement.style.visibility = "visible";
      document.getElementById("pw-input").focus();
      document.getElementById("pw-input").addEventListener("keydown", function(e) { if (e.key === "Enter") checkPW(); });
    });
    window.checkPW = function() {
      const entered = document.getElementById("pw-input").value;
      if (entered === correct) {
        document.querySelector("div[style*='z-index:99999']").remove();
      } else {
        document.getElementById("pw-error").style.display = "block";
        document.getElementById("pw-input").value = "";
      }
    };
  })();
</script>

function priSort(a, b) {
  var pa = PRI_ORDER[(a.priority||"").toLowerCase().trim()];
  var pb = PRI_ORDER[(b.priority||"").toLowerCase().trim()];
  if (pa === undefined) pa = 2;
  if (pb === undefined) pb = 2;
  return pa - pb;
}
function sortPri(arr) { return arr.slice().sort(priSort); }

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function badge(p) {
  var l = (p||"").toLowerCase();
  if (l.indexOf("critical") !== -1) return '<span class="badge b-crit">Critical</span>';
  if (l.indexOf("high")     !== -1) return '<span class="badge b-high">High</span>';
  if (l.indexOf("medium")   !== -1) return '<span class="badge b-med">Medium</span>';
  if (l.indexOf("wait")     !== -1) return '<span class="badge b-wait">Waiting</span>';
  if (l.indexOf("complet")  !== -1) return '<span class="badge b-done">Done</span>';
  if (l.indexOf("low")      !== -1) return '<span class="badge b-low">Low</span>';
  return p ? '<span class="badge b-low">' + esc(p) + '</span>' : "";
}
function avEl(name) {
  var c = OC[name] || {bg:"#e8e6e0",fg:"#6b6860"};
  var ini = name ? name.split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2) : "?";
  return '<div class="av" style="background:' + c.bg + ';color:' + c.fg + ';">' + ini + '</div>';
}
var _noteId = 0;
function card(p) {
  var isCrit = (p.priority||"").toLowerCase().indexOf("critical") !== -1;
  var owner  = p.owner || p.ba || p.engineer || "";
  var note   = (p.notes||"").trim();
  var noteHtml = "";
  if (note) {
    var nid = "n" + (++_noteId);
    // Count newlines + rough line wraps to decide if toggle is needed
    var needsToggle = note.length > 120 || note.indexOf("\n") !== -1;
    noteHtml = '<div class="card-note">' +
      '<div class="card-note-text" id="' + nid + '">' + esc(note).replace(/\n/g,"<br>") + '</div>' +
      (needsToggle ? '<button class="card-note-toggle" onclick="toggleNote(\'' + nid + '\',this)">Show more</button>' : '') +
      '</div>';
  }
  return '<div class="card' + (isCrit ? " crit-card" : "") + '">' +
    '<div class="card-top"><span class="card-name">' + esc(p.client) + '</span>' + badge(p.priority) + '</div>' +
    (p.project ? '<div class="card-proj">' + esc(p.project) + '</div>' : "") +
    '<div class="card-owner">' + avEl(owner) + '<span class="owner-lbl">' + esc(owner||"Unassigned") + '</span></div>' +
    noteHtml +
    '</div>';
}
function toggleNote(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  var expanded = el.classList.toggle("expanded");

}

function opsView() {
  var waiting = sortPri(projects.filter(function(p){return (p.priority||"").toLowerCase().indexOf("wait")!==-1;}));
  var active  = projects.filter(function(p){return (p.priority||"").toLowerCase().indexOf("wait")===-1;});
  var buckets = {};
  TYPE_ORDER.forEach(function(t){ buckets[t] = []; });
  active.forEach(function(p){
    var t = p.type || "Customer";
    if (!buckets[t]) buckets[t] = [];
    buckets[t].push(p);
  });
  Object.keys(buckets).forEach(function(k){ buckets[k] = sortPri(buckets[k]); });
  var cols = TYPE_ORDER.filter(function(t){ return buckets[t] && buckets[t].length; });
  if (waiting.length) { cols.push("_wait"); buckets["_wait"] = waiting; }
  var html = '<div class="ops-grid" style="grid-template-columns:repeat(' + Math.min(cols.length,5) + ',minmax(0,1fr));">';
  cols.forEach(function(key) {
    var label = key === "_wait" ? "&#x23F3; Waiting on Client" : key;
    var isWait = key === "_wait";
    var style = isWait ? ' style="background:var(--wait-bg);color:var(--wait);border-color:#b8cfee;"' : "";
    html += "<div>";
    html += '<div class="col-head"' + style + '>' + label + '<span>' + buckets[key].length + '</span></div>';
    html += '<div class="col-body">' + buckets[key].map(card).join("") + '</div>';
    html += "</div>";
  });
  return html + "</div>";
}

function parseCSV(text) {
  var lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function(h){
    return h.replace(/^"|"$/g,"").trim().toLowerCase()
            .replace(/client.*product/i,"client")
            .replace(/project number/i,"project_number")
            .replace(/\s+/g,"_");
  });
  var rows=[];
  for (var i=1;i<lines.length;i++){
    var vals=[],cur="",inQ=false;
    for (var j=0;j<lines[i].length;j++){
      var ch=lines[i][j];
      if(ch==="\""){inQ=!inQ;}
      else if(ch===","&&!inQ){vals.push(cur);cur="";}
      else{cur+=ch;}
    }
    vals.push(cur);
    var row={};
    headers.forEach(function(h,k){row[h]=(vals[k]||"").replace(/^"|"$/g,"").trim();});
    rows.push(row);
  }
  return rows;
}

// Clients we know are Onboarding — fallback when the sheet type field is missing/wrong
var ONBOARDING_CLIENTS = ["Europerfumes","The Maker","Clean Skin Club"];
// Clients/projects we know are R&D
var RD_CLIENTS = ["Store Database","Prod Development - Venus","Product Development",
                  "Prod Development - Dillard's","Mission Control"];

function normalizeRows(rows) {
  return rows.map(function(r){
    function g(){for(var i=0;i<arguments.length;i++){var v=r[arguments[i]]||r[(arguments[i]||"").toLowerCase()]||"";if(v)return(""+v).trim();}return"";}
    var rawType = g("type","project_type","Type");
    // Strip escape sequences the sheet may send (e.g. "R\&D" -> "R&D", "Onaboarding" -> caught below)
    var tl = rawType.replace(/\\/g,"").toLowerCase();
    var client = g("client","client_product")||Object.values(r)[0]||"";
    var proj   = (g("project")||"").toLowerCase();

    var type;
    if (tl.indexOf("onboard") !== -1 || proj.indexOf("onboard") !== -1) {
      type = "Onboarding";
    } else if (tl.indexOf("r&d") !== -1 || tl.indexOf("r&amp;d") !== -1 || tl === "r\\&d") {
      type = "R&D";
    } else if (tl.indexOf("internal") !== -1 || tl.indexOf("training") !== -1 || proj.indexOf("training") !== -1) {
      type = "Internal";
    } else if (ONBOARDING_CLIENTS.indexOf(client) !== -1) {
      type = "Onboarding";
    } else if (RD_CLIENTS.indexOf(client) !== -1) {
      type = "R&D";
    } else {
      type = "Customer";
    }

    return {
      client:client, project:g("project"), type:type, priority:g("priority"),
      owner:g("owner"), engineer:g("engineer"), ba:g("ba"),
      notes:g("notes","note")
    };
  }).filter(function(p){return p.client&&p.client.length>0;});
}

function setStatus(msg,live){
  document.getElementById("last-updated").innerHTML = live
    ? '<span class="live-dot"></span>'+msg : msg;
}

// Build a type lookup from seed data — seed is the source of truth for types
// The sheet's Type column is unreliable (typos, missing values)
var SEED_TYPE_MAP = {};
SEED_PROJECTS.forEach(function(p){
  var keyFull   = (p.client + "|" + p.project).toLowerCase();
  var keyClient = p.client.toLowerCase();
  SEED_TYPE_MAP[keyFull]   = p.type;
  if (!SEED_TYPE_MAP[keyClient]) SEED_TYPE_MAP[keyClient] = p.type;
});

function loadLive(){
  setStatus("Refreshing&hellip;",false);
  fetch(APPS_SCRIPT+"?t="+Date.now(),{cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(text){
      var parsed;
      try{parsed=JSON.parse(text);}catch(e){parsed=parseCSV(text);}
      if(Array.isArray(parsed)&&parsed.length>0){
        var normalized = normalizeRows(parsed);
        // Restore types from seed — never trust the live Type column
        normalized.forEach(function(p){
          var keyFull   = (p.client + "|" + p.project).toLowerCase();
          var keyClient = p.client.toLowerCase();
          if      (SEED_TYPE_MAP[keyFull])   p.type = SEED_TYPE_MAP[keyFull];
          else if (SEED_TYPE_MAP[keyClient]) p.type = SEED_TYPE_MAP[keyClient];
        });
        projects = normalized;
        var now = new Date();
        setStatus("Updated "+now.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" at "+now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),true);
        render();
      }
    })
    .catch(function(){setStatus("Showing embedded data &mdash; click Refresh to reload",false);});
}

setStatus("Embedded data current as of last deploy &mdash; click Refresh for live update",false);
render();
</script>
