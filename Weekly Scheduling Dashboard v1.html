<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Scheduling — Accelerated Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2744;--navy-light:#2d5282;--cream:#faf9f6;--surface:#fff;--border:#e2ddd6;--border-strong:#c8c2b8;--text:#1a1714;--text-muted:#8a8278;--critical-bg:#fde8e8;--critical:#7b1d1d;--high-bg:#fff0f0;--high:#c53030;--med-bg:#fef8ec;--med:#92580a;--wait-bg:#eef4fd;--wait:#1a4fa0;--done-bg:#edfaf2;--done:#276749;--low-bg:#f3f2ef;--low:#5c5a55;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
header{background:var(--navy);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;}
.header-right{display:flex;align-items:center;gap:12px;}
.week-label{color:#94a3b8;font-size:12px;font-family:'DM Mono',monospace;}
.refresh-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#cbd5e1;font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#4ade80;font-family:'DM Mono',monospace;}
.pulse{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:22px 28px;max-width:1440px;margin:0 auto;}
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.c-critical{color:var(--critical);}.c-wait{color:var(--wait);}.c-navy{color:var(--navy);}.c-done{color:var(--done);}
.tab-bar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px;width:fit-content;margin-bottom:20px;}
.tab{font-size:13px;font-weight:500;padding:7px 20px;border-radius:7px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--navy);color:#fff;}
.tab:hover:not(.active){color:var(--text);background:var(--cream);}
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.leg-dot{width:8px;height:8px;border-radius:50%;}
.ops-grid{display:grid;gap:12px;}
.col-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:8px;display:flex;justify-content:space-between;}
.col-body{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--border-strong);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.card.is-critical{border-left:3px solid var(--critical);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;font-family:'DM Mono',monospace;white-space:nowrap;}
.b-critical{background:var(--critical-bg);color:var(--critical);}
.b-high{background:var(--high-bg);color:var(--high);}
.b-med{background:var(--med-bg);color:var(--med);}
.b-wait{background:var(--wait-bg);color:var(--wait);}
.b-done{background:var(--done-bg);color:var(--done);}
.b-low{background:var(--low-bg);color:var(--low);}
.card-proj{font-size:10px;color:var(--text-muted);margin-bottom:5px;font-family:'DM Mono',monospace;}
.card-owner{display:flex;align-items:center;gap:5px;}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.owner-label{font-size:10px;color:var(--text-muted);}
.card-note{font-size:10px;color:var(--text-muted);margin-top:6px;border-top:1px solid var(--border);padding-top:5px;line-height:1.5;}
.section{margin-bottom:28px;}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.section-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.section-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.section-title{font-size:15px;font-weight:600;color:var(--text);}
.section-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.update-banner{background:var(--med-bg);border:1px solid #f0d085;border-radius:var(--r);padding:10px 16px;margin-bottom:18px;font-size:12px;color:var(--med);display:flex;align-items:center;gap:8px;}
</style>
</head>

  'Ryan Bruck':{bg:'#e1f5ee',fg:'#0f6e56'},
  'Scott Shadle':{bg:'#faece7',fg:'#8a3a1a'},
  'Peter Spillane':{bg:'#fbeaf0',fg:'#8a3256'},
  'Jeff Morrison':{bg:'#e6f1fb',fg:'#1a4fa0'},
  'Tim Nguyen':{bg:'#faeeda',fg:'#7a4a0a'},
  'Chad Symens':{bg:'#b5d4f4',fg:'#0c447c'},
  'Shelly Hagan':{bg:'#9fe1cb',fg:'#085041'},
};
const TC={
  'Onboarding':{icon:'🚀',bg:'#faece7',sub:'New client onboarding'},
  'Customer':{icon:'👤',bg:'#e6f1fb',sub:'Active customer projects'},
  'R&D':{icon:'🔬',bg:'#eaf3de',sub:'Internal product development'},
  'Internal Training':{icon:'🎓',bg:'#eeedfe',sub:'Team training'},
};
const PO=['In Progress','Onboarding','Waiting on Client','R&D','Completed'];
const TO=['Onboarding','Customer','R&D','Internal Training'];

function badge(p){
  const l=(p||'').toLowerCase();
  if(l.includes('critical'))return'<span class="badge b-critical">Critical</span>';
  if(l.includes('high'))return'<span class="badge b-high">High</span>';
  if(l.includes('medium'))return'<span class="badge b-med">Medium</span>';
  if(l.includes('wait'))return'<span class="badge b-wait">Waiting</span>';
  if(l.includes('complet'))return'<span class="badge b-done">Done</span>';
  if(l.includes('low'))return'<span class="badge b-low">Low</span>';
  return`<span class="badge b-low">${p}</span>`;
}
function av(o){
  const c=OC[o]||{bg:'#e8e6e0',fg:'#6b6860'};
  const i=o?o.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'—';
  return`<div class="av" style="background:${c.bg};color:${c.fg};">${i}</div>`;
}
function card(p,showPhase){
  const crit=(p.priority||'').toLowerCase().includes('critical');
  const proj=[showPhase?p.phase:'',p.project].filter(Boolean).join(' · ');
  return`<div class="card${crit?' is-critical':''}">
    <div class="card-top"><span class="card-name">${p.client}</span>${badge(p.priority)}</div>
    ${proj?`<div class="card-proj">${proj}</div>`:''}
    <div class="card-owner">${av(p.owner||'')}<span class="owner-label">${p.owner||'Unassigned'}</span></div>
    ${p.notes?`<div class="card-note">${p.notes.slice(0,130)}${p.notes.length>130?'…':''}</div>`:''}
  </div>`;
}
function opsView(ps){
  const g={};PO.forEach(ph=>{const r=ps.filter(p=>p.phase===ph);if(r.length)g[ph]=r;});
  const cols=Object.keys(g);
  return`<div class="ops-grid" style="grid-template-columns:repeat(${Math.min(cols.length,4)},minmax(0,1fr))">
    ${cols.map(ph=>`<div><div class="col-head">${ph}<span>${g[ph].length}</span></div><div class="col-body">${g[ph].map(p=>card(p)).join('')}</div></div>`).join('')}
  </div>`;
}
function ownerView(ps){
  const o={};ps.forEach(p=>{const k=p.owner||'Unassigned';if(!o[k])o[k]=[];o[k].push(p);});
  return Object.entries(o).sort((a,b)=>b[1].length-a[1].length).map(([n,rows])=>{
    const c=OC[n]||{bg:'#e8e6e0',fg:'#6b6860'};
    const i=n==='Unassigned'?'?':n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const crit=rows.filter(r=>(r.priority||'').toLowerCase().includes('critical')).length;
    const wait=rows.filter(r=>(r.phase||'').includes('Waiting')).length;
    return`<div class="section">
      <div class="section-head">
        <div class="section-av" style="background:${c.bg};color:${c.fg};">${i}</div>
        <div><div class="section-title">${n}</div><div class="section-sub">${rows.length} project${rows.length!==1?'s':''}${crit?' · '+crit+' critical':''}${wait?' · '+wait+' waiting':''}</div></div>
      </div>
      <div class="cards-grid">${rows.map(p=>card(p,true)).join('')}</div>
    </div>`;
  }).join('');
}
function typeView(ps){
  return TO.map(t=>{
    const rows=ps.filter(p=>p.type===t);if(!rows.length)return'';
    const cfg=TC[t]||{icon:'📁',bg:'#f3f2ef',sub:''};
    return`<div class="section">
      <div class="section-head">
        <div class="section-icon" style="background:${cfg.bg};">${cfg.icon}</div>
        <div><div class="section-title">${t}</div><div class="section-sub">${rows.length} project${rows.length!==1?'s':''} · ${cfg.sub}</div></div>
      </div>
      <div class="cards-grid">${rows.map(p=>card(p,true)).join('')}</div>
    </div>`;
  }).join('');
}

let currentTab='ops';
function render(tab){
  currentTab=tab;
  const ps=PROJECTS;
  const total=ps.length,crit=ps.filter(p=>(p.priority||'').toLowerCase().includes('critical')).length,
    wait=ps.filter(p=>(p.phase||'').includes('Waiting')).length,
    onb=ps.filter(p=>(p.phase||'').includes('Onboarding')).length,
    done=ps.filter(p=>(p.phase||'').includes('Completed')).length;
  const views={ops:opsView(ps),owner:ownerView(ps),type:typeView(ps)};
  document.getElementById('app').innerHTML=`
    <div class="update-banner">💡 To update for next week: open this file in a text editor, find the PROJECTS array, and edit the rows. Save and refresh.</div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Projects</div><div class="stat-val c-navy">${total}</div></div>
      <div class="stat"><div class="stat-label">Critical</div><div class="stat-val c-critical">${crit}</div></div>
      <div class="stat"><div class="stat-label">Waiting Client</div><div class="stat-val c-wait">${wait}</div></div>
      <div class="stat"><div class="stat-label">Onboarding</div><div class="stat-val">${onb}</div></div>
      <div class="stat"><div class="stat-label">Completed</div><div class="stat-val c-done">${done}</div></div>
    </div>
    <div class="tab-bar">
      <button class="tab${tab==='ops'?' active':''}" onclick="render('ops')">Operational</button>
      <button class="tab${tab==='owner'?' active':''}" onclick="render('owner')">By owner</button>
      <button class="tab${tab==='type'?' active':''}" onclick="render('type')">By project type</button>
    </div>
    <div class="legend">
      <span style="font-size:11px;font-weight:600;color:var(--text-muted);margin-right:2px;">Priority:</span>
      <div class="leg"><div class="leg-dot" style="background:var(--critical)"></div>Critical</div>
      <div class="leg"><div class="leg-dot" style="background:var(--high)"></div>High</div>
      <div class="leg"><div class="leg-dot" style="background:var(--med)"></div>Medium</div>
      <div class="leg"><div class="leg-dot" style="background:var(--wait)"></div>Waiting</div>
      <div class="leg"><div class="leg-dot" style="background:var(--done)"></div>Completed</div>
      <div class="leg"><div class="leg-dot" style="background:var(--low)"></div>Low</div>
    </div>
    ${views[tab]}`;
}
